<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenu·e dans l'équipe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #11998e;
            margin-bottom: 20px;
        }
        p {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
        }
        .user-id {
            color: #999;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Salut et bienvenue dans l'équipe, {{name}}!</h1>
        <p>Nous sommes ravis de vous accueillir parmi notre équipe. N'hésitez pas à contacter vos collègues si vous avez des questions.</p>
        <p>Cordialement,</p>
        <p>Magasin du Coin</p>
        <p class="user-id">Votre ID Utilisateur: {{user_id}}</p>
        <p class="user-id">Votre adresse courriel: {{email}}</p>
        <p class="user-id">Crée à {{creation_date}}</p>
    </div>
</body>
</html>
